<!DOCTYPE html>
<html lang="fil">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para kay Mama at Papa</title>
    <style>
        /* CSS Reset & Setup */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            height: 100%; width: 100%; overflow: hidden;
            background-color: #7D2AE8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Background Gradient */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animated-bg {
            background: linear-gradient(-45deg, #00C4CC, #7D2AE8, #FF66C4, #FFDE59);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100%; width: 100%; position: fixed;
            top: 0; left: 0; display: flex; flex-direction: column;
        }

        /* Glass Effect */
        .glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        /* --- MAIN UI STYLES --- */
        #main-ui {
            display: flex; flex-direction: column; justify-content: space-between; align-items: center;
            height: 100%; width: 100%; padding: 2rem;
            transition: all 1s ease;
        }
        .header-section { text-align: center; margin-top: 2.5rem; }
        .title-text { font-size: 3rem; font-weight: 900; margin-bottom: 2.5rem; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .names-row { display: flex; gap: 1rem; justify-content: center; }
        .name-box { padding: 1rem 2rem; border-radius: 1.5rem; font-size: 1.5rem; font-weight: bold; }
        .footer-text { text-align: center; color: rgba(255,255,255,0.7); font-size: 10px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.3em; margin-bottom: 1rem; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }

        /* Envelope */
        .envelope-wrapper {
            position: relative; width: 260px; height: 160px;
            background: white; border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: all 1.5s cubic-bezier(0.7, 0, 0.3, 1);
            transform-origin: center; cursor: pointer;
        }
        .flap {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #f3f4f6; clip-path: polygon(0 0, 100% 0, 50% 50%);
            transition: transform 0.8s ease-in-out; transform-origin: top; z-index: 10;
        }
        .envelope-center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
        .open-btn {
            background-color: #7D2AE8; color: white; padding: 0.5rem 1.5rem; border-radius: 9999px;
            font-weight: 900; font-size: 0.75rem; box-shadow: 0 10px 15px rgba(0,0,0,0.2);
            text-transform: uppercase; letter-spacing: 0.1em; z-index: 20;
        }
        
        .opened { transform: scale(35) !important; opacity: 0; pointer-events: none; }
        .opened .flap { transform: rotateX(180deg); }
        .fade-out { opacity: 0; transform: scale(0.9); pointer-events: none; }

        /* Progress & Typing */
        .progress-container {
            position: fixed; top: 40px; left: 10%; width: 80%; height: 4px;
            background: rgba(255,255,255,0.2); border-radius: 10px; z-index: 100;
            opacity: 0; transition: opacity 1s ease;
        }
        .progress-bar { height: 100%; width: 0%; background: white; box-shadow: 0 0 10px white; transition: width 0.5s ease; border-radius: 10px; }
        .letter-screen {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            padding: 1.5rem; opacity: 0; pointer-events: none; transition: opacity 1s ease; z-index: 90;
        }
        .letter-box { width: 100%; max-width: 24rem; padding: 2rem; border-radius: 2.5rem; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; }
        #typing-container { width: 100%; max-height: 65vh; overflow-y: auto; text-align: center; font-weight: 800; line-height: 1.4; text-shadow: 0 2px 10px rgba(0,0,0,0.3); scrollbar-width: none; }

        /* Cake UI STYLES */
        .cake-container {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
        }
        .instruction-text { font-weight: 900; font-size: 1.25rem; text-align: center; margin-bottom: 2.5rem; text-shadow: 0 4px 6px rgba(0,0,0,0.3); animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(-25%); } 50% { transform: none; } }

        .cake-platform { position: relative; width: 250px; height: 250px; display: flex; justify-content: center; align-items: flex-end; cursor: pointer; transition: transform 0.2s; }
        .cake-base { position: relative; width: 200px; height: 130px; background: #4e342e; border-radius: 10px 10px 4px 4px; box-shadow: inset 0 -10px 0 rgba(0,0,0,0.3); border-bottom: 6px solid #2b1d1a; }
        .cake-layer { position: absolute; top: 55px; width: 100%; height: 18px; background: #3e2723; }
        .icing-top { position: absolute; top: -12px; width: 216px; left: -8px; height: 50px; background: #ffc2d1; border-radius: 20px 20px 10px 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .icing-drip { position: absolute; top: 28px; display: flex; width: 100%; justify-content: space-around; padding: 0 5px; }
        .drip { width: 16px; background: #ffc2d1; border-radius: 0 0 10px 10px; }
        
        .candle { position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%); width: 15px; height: 50px; background: repeating-linear-gradient(45deg, #fff, #fff 6px, #ff4d6d 6px, #ff4d6d 12px); border-radius: 5px; z-index: 5; border: 1px solid rgba(0,0,0,0.1); }
        .flame { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 20px; height: 32px; background: radial-gradient(circle, #ffeb3b 20%, #ff9800 60%, #f44336 100%); border-radius: 50% 50% 20% 20%; box-shadow: 0 0 15px #ff9800, 0 0 30px #ff5722; animation: flicker 0.1s infinite alternate; }
        .flame.blown { display: none; }

        .cake-greeting { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-shadow: 0 2px 4px rgba(0,0,0,0.3); padding-top: 1.5rem; }
        .greeting-small { font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.9; }
        .greeting-large { font-size: 1.5rem; font-weight: 900; line-height: 1; text-transform: uppercase; }

        @keyframes flicker { 0% { transform: translateX(-50%) scale(1) rotate(-2deg); } 100% { transform: translateX(-50%) scale(1.15) rotate(2deg); } }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* Final Message */
        #final-msg { text-align: center; margin-top: 3rem; padding: 0 2.5rem; display: none; }
        #final-msg.show { display: block; animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .yay-text { font-size: 3rem; font-weight: 900; margin-bottom: 0.5rem; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .yay-subtext { font-size: 1.25rem; font-weight: bold; font-style: italic; }
        .restart-btn { margin-top: 2rem; background: white; color: #7D2AE8; padding: 0.75rem 2.5rem; border-radius: 9999px; font-weight: 900; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.1em; cursor: pointer; }
        .restart-btn:active { transform: scale(0.95); }

        @keyframes scaleIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="animated-bg">

    <!-- MP3 Background Music -->
    <audio id="bgMusic" loop preload="auto">
        <source src="background-sad-song.mp3" type="audio/mpeg">
    </audio>

    <!-- Voice Overs -->
    <audio id="v1" preload="auto"><source src="voice 1 part 1.m4a" type="audio/mp4"></audio>
    <audio id="v2" preload="auto"><source src="voice 2.m4a" type="audio/mp4"></audio>
    <audio id="v3" preload="auto"><source src="voice 3.m4a" type="audio/mp4"></audio>
    <audio id="v4" preload="auto"><source src="voice 4.m4a" type="audio/mp4"></audio>
    <audio id="v5" preload="auto"><source src="voice 5.m4a" type="audio/mp4"></audio>
    <audio id="v6" preload="auto"><source src="voice 6.m4a" type="audio/mp4"></audio>

    <div id="main-ui">
        <div class="header-section">
            <h1 class="title-text">Para kay</h1>
            <div class="names-row">
                <div class="glass name-box">Mama</div>
                <div class="glass name-box">Papa</div>
            </div>
        </div>

        <div id="envelope-trigger" class="envelope-wrapper">
            <div class="flap"></div>
            <div class="envelope-center">
                <div class="pulse open-btn">Pindutin ang Sobre ✨</div>
            </div>
        </div>

        <div class="footer-text">Isang surpresa mula sa inyong mga anak</div>
    </div>

    <div id="progress-container" class="progress-container">
        <div id="bar" class="progress-bar"></div>
    </div>

    <div id="letter-screen" class="letter-screen">
        <div class="glass letter-box">
            <div id="typing-container"></div>
        </div>
    </div>

    <!-- Realistic Cake UI -->
    <div id="cake-ui" class="cake-container">
        <div id="instruction" class="instruction-text">
            🎂 PINDUTIN ANG CAKE NG 3 BESES<br>PARA MAHIPAN ANG KANDILA!
        </div>

        <div class="cake-platform" onclick="handleCakeClick()">
            <div class="candle"><div id="flame" class="flame"></div></div>
            <div class="cake-base">
                <div class="cake-layer"></div>
                <div class="icing-top"></div>
                <div class="icing-drip">
                    <div class="drip" style="height: 38px;"></div>
                    <div class="drip" style="height: 22px;"></div>
                    <div class="drip" style="height: 45px;"></div>
                    <div class="drip" style="height: 28px;"></div>
                    <div class="drip" style="height: 32px;"></div>
                </div>
                <div class="cake-greeting">
                    <div class="greeting-small">Happy Birthday &</div>
                    <div class="greeting-large">Anniversary!</div>
                </div>
            </div>
        </div>

        <div id="final-msg">
            <h2 class="yay-text">YAY! 🎊</h2>
            <p class="yay-subtext">Mahal na mahal namin kayo!</p>
            <button onclick="location.reload()" class="restart-btn">Ulitin Surpresa</button>
        </div>
    </div>

    <script>
        const trigger = document.getElementById('envelope-trigger');
        const mainUI = document.getElementById('main-ui');
        const letterScreen = document.getElementById('letter-screen');
        const typingContainer = document.getElementById('typing-container');
        const progressBar = document.getElementById('bar');
        const progressContainer = document.getElementById('progress-container');
        const cakeUI = document.getElementById('cake-ui');
        const flame = document.getElementById('flame');
        const instruction = document.getElementById('instruction');
        const finalMsg = document.getElementById('final-msg');
        const bgMusic = document.getElementById('bgMusic');

        const audios = [
            document.getElementById('v1'), document.getElementById('v2'),
            document.getElementById('v3'), document.getElementById('v4'),
            document.getElementById('v5'), document.getElementById('v6')
        ];

        const messages = [
            "Happy Birthday at Happy wedding anniversary po mama and papa!",
            "Maraming Maraming salamat po sa inyong pag-aalaga, pagmamahal, at walang sawang suporta nyo po sa amin. Pasensya na po Ma kung hindi po kami agad bumati ng Happy Mother’s Day.",
            "Sana lagi po kayong healthy upang tayo po ay maligaya kahit na tayo lang po ay mahirap. Kahit ang sulat na ito ay simple lamang, puno ng pagmamahal ang aming nais iparating mula sa inyo po. Mahal na mahal ka namin, Mama at Papa!",
            "Pangako po namin na gagawin po namin ang aming makakaya upang maging masaya ang ating pamilyang puno ng pagmamahal. Pasyensya na din po kayo Ma kung hindi po kami minsan sumusunod sa inyo po. Naway mapatawad nyo po sana kami.",
            "God bless us all!",
            "Mula sa anak nyo pong pogi at maganda syempre,\n\nZyrus pogi and Zyra pretty"
        ];

        let currentStep = 0;
        let taps = 0;

        trigger.addEventListener('click', () => {
            trigger.classList.add('opened');
            mainUI.classList.add('fade-out');

            bgMusic.currentTime = 25; 
            bgMusic.volume = 0.15;
            bgMusic.play().catch(e => console.log("Audio waiting..."));

            setTimeout(() => {
                progressContainer.style.opacity = '1';
                letterScreen.style.opacity = '1';
                mainUI.style.display = 'none';
                startStory();
            }, 1200);
        });

        async function startStory() {
            if (currentStep >= messages.length) {
                setTimeout(() => {
                    letterScreen.style.opacity = '0';
                    progressContainer.style.opacity = '0';
                    setTimeout(() => {
                        letterScreen.style.display = 'none';
                        cakeUI.style.display = 'flex';
                    }, 1000);
                }, 2000);
                return;
            }
            
            if (currentStep === 0) {
                bgMusic.volume = 0.35;
            }

            const msg = messages[currentStep];
            const audio = audios[currentStep];
            typingContainer.innerHTML = "";
            typingContainer.style.fontSize = msg.length > 120 ? "1.1rem" : "1.45rem";
            
            try { await audio.play(); } catch(e) {}
            
            let dur = audio.duration || Math.max(5, msg.length / 14);
            await typeMessage(msg, dur);
            
            progressBar.style.width = `${((currentStep + 1) / messages.length) * 100}%`;
            setTimeout(() => { currentStep++; startStory(); }, 1500);
        }

        function typeMessage(text, dur) {
            return new Promise(resolve => {
                let i = 0;
                const delay = (dur * 960) / text.length;
                function type() {
                    if (i < text.length) {
                        typingContainer.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                        i++; setTimeout(type, delay);
                    } else resolve();
                }
                type();
            });
        }

        function handleCakeClick() {
            if (taps < 3) {
                taps++;
                const cakeNode = document.querySelector('.cake-platform');
                cakeNode.style.transform = 'scale(0.92)';
                setTimeout(() => cakeNode.style.transform = 'scale(1)', 100);
                
                if (taps === 1) instruction.innerHTML = "🕯️ MUNTI NA! <br>PINDUTIN PA ISA!";
                if (taps === 2) instruction.innerHTML = "🔥 ISA NA LANG! <br>HIPAN NA PO!";
                
                if (taps === 3) {
                    flame.classList.add('blown');
                    instruction.style.display = 'none';
                    finalMsg.classList.add('show');
                    bgMusic.volume = 0.5; 
                }
            }
        }
    </script>
</body>
</html>
